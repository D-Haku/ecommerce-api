services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpw
      MYSQL_DATABASE: ecommerce
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppw
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uappuser", "-papppw"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  ingest:
    build:
      context: .
      dockerfile: Dockerfile.ingest
    restart: "no"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: appuser
      DB_PASSWORD: apppw
      DB_NAME: ecommerce
      ES_NODE: http://elasticsearch:9200
      SOURCE_API_URL: https://dummyjson.com/products
      LOG_LEVEL: info
    depends_on:
      mysql:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "3000:3000"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: appuser
      DB_PASSWORD: apppw
      DB_NAME: ecommerce
      ES_NODE: http://elasticsearch:9200
      API_PORT: 3000
      LOG_LEVEL: info
    depends_on:
      ingest:
        condition: service_completed_successfully

volumes:
  mysql_data:
  es_data:
